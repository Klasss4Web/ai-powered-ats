name: Deploy to ECS

on:
  push:
    branches: [master]

env:
  AWS_REGION: eu-west-2
  APP_NAME: atsmatcherbackend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # =========================
      # AWS AUTH
      # =========================
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================
      # LOAD INFRASTRUCTURE VALUES (from .env or hardcoded)
      # =========================
      - name: Load infra outputs
        run: |
          echo "ECR_REPO=${{ secrets.ECR_REPO || '717691231443.dkr.ecr.eu-west-2.amazonaws.com/ats-matcher-backend-repo' }}" >> $GITHUB_ENV
          echo "ECS_CLUSTER=${{ secrets.ECS_CLUSTER || 'ats-matcher-backend-cluster' }}" >> $GITHUB_ENV
          echo "ECS_SERVICE=${{ secrets.ECS_SERVICE || 'ats-matcher-backend-service' }}" >> $GITHUB_ENV

      # =========================
      # LOGIN TO ECR
      # =========================
      - name: Login to Amazon ECR
        run: |
          REGISTRY=$(echo $ECR_REPO | cut -d'/' -f1)

          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $REGISTRY

      # =========================
      # BUILD + PUSH IMAGE
      # =========================
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}

          docker build -t app .
          docker tag app:latest $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:$IMAGE_TAG

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # =========================
      # UPDATE ECS SERVICE
      # =========================
      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION
